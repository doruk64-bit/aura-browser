version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React + Vite
  - ui_library: Tailwind CSS (via @tailwindcss/vite) + framer-motion
  - other: Electron (desktop shell), Zustand (state)
routes:
  - path: /
    file: src/renderer/App.tsx
    auth_required: false
    description: Main renderer UI (TopBar + Sidebar + WebViewArea + FindBar)
features:
  - name: Tab management
    description: Create, close, switch and reorder tabs; display active tab URL/loading state.
    files:
      - src/renderer/components/TopBar/TabStrip.tsx
      - src/renderer/components/TopBar/Tab.tsx
      - src/renderer/store/useTabStore.ts
      - src/main/ipc/handlers.ts
    entry_route: /
    user_interactions:
      - View the tab strip and active tab
      - Create a new tab (UI action triggers IPC)
      - Switch between tabs
      - Drag and reorder tabs
      - Close a tab
    api_calls: []
    auth_required: false

  - name: Omnibox navigation
    description: Unified address/search bar that navigates to a URL or search query.
    files:
      - src/renderer/components/TopBar/Omnibox.tsx
      - src/main/ipc/handlers.ts
      - src/main/window/tab-manager.ts
    entry_route: /
    user_interactions:
      - Click the omnibox input
      - Type a URL or search query
      - Press Enter to navigate
      - Observe loading indicator; optionally press stop to halt loading
    api_calls: []
    auth_required: false

  - name: Sidebar panels (Bookmarks, History, Downloads, Workspaces, Settings)
    description: Opera-style left sidebar that opens panels for browsing data and app tools.
    files:
      - src/renderer/components/Sidebar/Sidebar.tsx
      - src/renderer/components/Sidebar/BookmarksPanel.tsx
      - src/renderer/components/Sidebar/HistoryPanel.tsx
      - src/renderer/components/Sidebar/DownloadsPanel.tsx
      - src/renderer/components/Sidebar/WorkspacesPanel.tsx
      - src/renderer/components/Sidebar/SettingsPanel.tsx
      - src/main/ipc/handlers.ts
    entry_route: /
    user_interactions:
      - Click the Bookmarks icon to open the bookmarks panel
      - Click the History icon to open the history panel
      - Click the Downloads icon to open the downloads panel
      - Click the Workspaces icon to open the workspaces panel
      - Click the Settings icon to open settings
      - Close the active panel via the ✕ button
    api_calls: []
    auth_required: false

  - name: Find in page
    description: Find text within the currently active web contents (Ctrl+F).
    files:
      - src/renderer/App.tsx
      - src/renderer/components/FindBar/FindBar.tsx
      - src/renderer/hooks/useKeyboard.ts
      - src/main/ipc/handlers.ts
      - src/main/engine/search.ts
    entry_route: /
    user_interactions:
      - Press Ctrl+F to open the find bar
      - Type search text and trigger find in page
      - Press Escape or close to hide the find bar
    api_calls: []
    auth_required: false

  - name: AdBlock toggle and incognito window
    description: Toggle ad blocker and open a new incognito window from Settings panel.
    files:
      - src/renderer/components/Sidebar/SettingsPanel.tsx
      - src/main/ipc/handlers.ts
      - src/main/engine/adblocker.ts
      - src/main/window/WindowManager.ts
    entry_route: /
    user_interactions:
      - Open Settings panel
      - Toggle the AdBlock switch
      - Click "Yeni Gizli Pencere" to open an incognito window
    api_calls: []
    auth_required: false
known_limitations:
  - issue: In web-only Vite preview, electron bridge may be absent so navigation/history/bookmarks actions no-op.
    location: src/renderer/components/TopBar/Omnibox.tsx
    impact: UI renders but many actions depend on window.electronAPI (Electron preload).
  - issue: Downloads panel is a stub and not wired to IPC events yet.
    location: src/renderer/components/Sidebar/DownloadsPanel.tsx
    impact: Download list/progress will not appear until preload/IPC integration is completed.
