name: Build/Release 🚀

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code 📥
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🛠️
        run: npm install

      - name: Build Code 🏗️
        run: npm run build

      - name: Package Windows 🪟
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win -p ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Mac 🍎
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac -p ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }} -c.mac.identity=null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Artifacts 📦
        uses: actions/upload-artifact@v4
        with:
          name: MorrowBrowser-${{ matrix.os }}
          path: release/*
